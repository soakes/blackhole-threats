name: Container Image

on:
  pull_request:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Release tag to publish with the current workflow definition, for example v1.2.3 or v1.2.3-rc.1
        required: false
        type: string
  push:
    branches:
      - main
    tags:
      - v*

concurrency:
  group: container-${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.sha }}
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref_name }}

permissions:
  contents: read

jobs:
  docker-build:
    name: Validate Container Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ env.CHECKOUT_REF }}

      - name: Compute build metadata
        id: prep
        run: |
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          version="$(git describe --tags --always --dirty 2>/dev/null || printf '%s' dev)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=test-

      - name: Build test image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: blackhole-threats:test
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.prep.outputs.version }}
            VCS_REF=${{ steps.prep.outputs.source_sha }}
            BUILD_DATE=${{ steps.prep.outputs.build_date }}

      - name: Verify container bootstrap
        run: |
          mkdir -p .tmp-config
          cid="$(docker run -d -v "$PWD/.tmp-config:/config" blackhole-threats:test)"
          sleep 5
          test -f .tmp-config/blackhole-threats.yaml
          docker logs "$cid"
          docker kill --signal=SIGINT "$cid"
          docker wait "$cid"
          logs="$(docker logs "$cid" 2>&1)"
          printf '%s\n' "$logs"
          printf '%s\n' "$logs" | grep -F 'msg="Starting blackhole-threats"'
          printf '%s\n' "$logs" | grep -F 'tag_version='
          printf '%s\n' "$logs" | grep -F 'msg="Stopped blackhole-threats"'
          docker rm -f "$cid"
          rm -rf .tmp-config

      - name: Smoke test container entrypoints
        run: |
          mkdir -p .tmp-config
          cp examples/blackhole-threats.yaml .tmp-config/custom.yaml
          docker run --rm --entrypoint /usr/sbin/blackhole-threats blackhole-threats:test -version
          docker run --rm \
            --entrypoint /usr/local/bin/blackhole-threats-entrypoint \
            -v "$PWD/.tmp-config:/config" \
            -e BLACKHOLE_THREATS_EXTRA_OPTS="-check-config" \
            blackhole-threats:test
          docker run --rm \
            --entrypoint /usr/local/bin/blackhole-threats-entrypoint \
            -v "$PWD/.tmp-config:/config" \
            -e BLACKHOLE_THREATS_CONF="/config/custom.yaml" \
            -e BLACKHOLE_THREATS_EXTRA_OPTS="-check-config" \
            blackhole-threats:test
          ! docker run --rm \
            --entrypoint /usr/local/bin/blackhole-threats-entrypoint \
            -e BLACKHOLE_THREATS_CONF="/config/missing.yaml" \
            blackhole-threats:test
          rm -rf .tmp-config

      - name: Validate published platforms
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.prep.outputs.version }}
            VCS_REF=${{ steps.prep.outputs.source_sha }}
            BUILD_DATE=${{ steps.prep.outputs.build_date }}

  verify-publish-ref:
    name: Verify Publish Ref
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))) ||
      (github.event_name == 'workflow_dispatch' && (startsWith(github.ref, 'refs/tags/v') || startsWith(inputs.release_ref || '', 'v')))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ env.CHECKOUT_REF }}

      - name: Ensure publish ref is trusted
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            exit 0
          fi

          default_branch="${DEFAULT_BRANCH}"
          publish_commit="$(git rev-parse HEAD^0)"

          git fetch origin "${default_branch}:refs/remotes/origin/${default_branch}" --force
          git merge-base --is-ancestor "${publish_commit}" "refs/remotes/origin/${default_branch}"

  docker-publish:
    name: Publish GHCR Image
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))) ||
      (github.event_name == 'workflow_dispatch' && (startsWith(github.ref, 'refs/tags/v') || startsWith(inputs.release_ref || '', 'v')))
    runs-on: ubuntu-latest
    needs:
      - docker-build
      - verify-publish-ref
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ env.CHECKOUT_REF }}

      - name: Compute build metadata
        id: prep
        run: |
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          version="$(git describe --tags --always --dirty 2>/dev/null || printf '%s' dev)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Compute publish tags
        id: publish_tags
        run: |
          image="${REGISTRY}/${IMAGE_NAME}"
          ref_name="${RELEASE_REF}"

          if [ "${GITHUB_REF}" = "refs/heads/main" ] && [ "${{ github.event_name }}" = "push" ]; then
            {
              echo "tags<<EOF"
              printf '%s\n' "${image}:main"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${ref_name}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)-rc\.[0-9]+$ ]]; then
            {
              echo "tags<<EOF"
              printf '%s\n' \
                "${image}:${ref_name}" \
                "${image}:rc"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${ref_name}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            {
              echo "tags<<EOF"
              printf '%s\n' \
                "${image}:${ref_name}" \
                "${image}:${major}.${minor}.${patch}" \
                "${image}:${major}.${minor}" \
                "${image}:latest"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "Unsupported publish ref: ${ref_name}" >&2
          exit 1

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.publish_tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.prep.outputs.version }}
            VCS_REF=${{ steps.prep.outputs.source_sha }}
            BUILD_DATE=${{ steps.prep.outputs.build_date }}
