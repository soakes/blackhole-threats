name: Release Assets

on:
  push:
    tags:
      - v*
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-release-tag:
    name: Verify Release Tag
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Ensure release tag points to main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main

  binaries:
    name: Build Binary ${{ matrix.goos }}/${{ matrix.goarch }}
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - verify-release-tag
    strategy:
      fail-fast: true
      matrix:
        include:
          - goos: linux
            goarch: amd64
            goarm: ""
          - goos: linux
            goarch: arm64
            goarm: ""
          - goos: linux
            goarch: arm
            goarm: "7"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Compute build metadata
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME:-dev}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: |
          mkdir -p dist
          make build-cross \
            VERSION=${{ steps.meta.outputs.version }} \
            COMMIT=${{ github.sha }} \
            BUILD_DATE=${{ steps.meta.outputs.build_date }} \
            GOOS=${{ matrix.goos }} \
            GOARCH=${{ matrix.goarch }} \
            GOARM=${{ matrix.goarm }} \
            OUTPUT=dist/blackhole-threats-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Archive binary
        run: |
          cd dist
          tar -czf blackhole-threats-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz blackhole-threats-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  packages:
    name: Build Debian ${{ matrix.arch }}
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - verify-release-tag
    strategy:
      fail-fast: true
      matrix:
        arch:
          - amd64
          - arm64
          - armhf

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Compute build metadata
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME:-dev}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build Debian package in Debian trixie
        run: |
          docker run --rm \
            -e DEBIAN_FRONTEND=noninteractive \
            -e ARCH=${{ matrix.arch }} \
            -e VERSION=${{ steps.meta.outputs.version }} \
            -e COMMIT=${{ github.sha }} \
            -e BUILD_DATE=${{ steps.meta.outputs.build_date }} \
            -v "$PWD:/src" \
            -w /src \
            debian:trixie \
            bash -lc '
              apt-get update
              apt-get install -y debhelper golang-any build-essential devscripts git
              bash scripts/prepare-debian-changelog.sh "${VERSION}"
              mkdir -p dist
              DEB_BUILD_OPTIONS=nocheck \
              DEB_HOST_ARCH="${ARCH}" \
              BLACKHOLE_LDFLAGS="-X github.com/soakes/blackhole-threats/internal/buildinfo.Version=${VERSION} -X github.com/soakes/blackhole-threats/internal/buildinfo.Commit=${COMMIT} -X github.com/soakes/blackhole-threats/internal/buildinfo.BuildDate=${BUILD_DATE}" \
                dpkg-buildpackage -us -uc -b -a"${ARCH}"
              find .. -maxdepth 1 -type f \( -name "*.deb" -o -name "*.changes" -o -name "*.buildinfo" \) -exec mv {} dist/ \;
            '

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: debian-${{ matrix.arch }}
          path: dist/*

  source-packages:
    name: Build Debian Source Package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - verify-release-tag

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build Debian source package in Debian trixie
        run: |
          docker run --rm \
            -e DEBIAN_FRONTEND=noninteractive \
            -e VERSION=${{ github.ref_name }} \
            -v "$PWD:/src" \
            -w /src \
            debian:trixie \
            bash -lc '
              apt-get update
              apt-get install -y debhelper golang-any build-essential devscripts git
              bash scripts/prepare-debian-changelog.sh "${VERSION}"
              package="$(dpkg-parsechangelog -SSource)"
              package_version="$(dpkg-parsechangelog -SVersion)"
              upstream_version="${package_version%-*}"
              if [ ! -f "../${package}_${upstream_version}.orig.tar.gz" ]; then
                git archive \
                  --format=tar.gz \
                  --prefix="${package}-${upstream_version}/" \
                  -o "../${package}_${upstream_version}.orig.tar.gz" \
                  HEAD
              fi
              dpkg-buildpackage -us -uc -S -sa
              mkdir -p dist
              find .. -maxdepth 1 -type f \
                \( \
                  -name "*.dsc" -o \
                  -name "*.orig.tar.*" -o \
                  -name "*.debian.tar.*" -o \
                  -name "*.diff.gz" -o \
                  -name "*.changes" -o \
                  -name "*.buildinfo" \
                \) \
                -exec mv {} dist/ \;
            '

      - name: Upload source package artifact
        uses: actions/upload-artifact@v7
        with:
          name: debian-source
          path: dist/*

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - binaries
      - packages
      - source-packages
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Generate release notes
        run: |
          previous_tag="$(
            git for-each-ref --sort=-v:refname --format='%(refname:short)' refs/tags/v* \
              | grep -vx "${GITHUB_REF_NAME}" \
              | head -n1 || true
          )"
          bash scripts/generate-release-notes.sh "${previous_tag}" "${GITHUB_SHA}" dist/release-notes.md

      - name: Generate checksums
        run: |
          cd dist
          find . -type f ! -name 'sha256sums.txt' -print0 | sort -z | xargs -0 sha256sum > sha256sums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release-notes.md
          files: dist/**/*
