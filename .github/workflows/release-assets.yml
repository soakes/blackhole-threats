name: Release Assets

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      release_ref:
        description: Release tag to publish with the current workflow definition, for example v1.2.3 or v1.2.3-rc.1
        required: false
        type: string

concurrency:
  group: release-${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_ref || github.ref_name }}
  cancel-in-progress: false

env:
  CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.sha }}
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref_name }}

permissions:
  contents: read

jobs:
  verify-release-tag:
    name: Verify Release Tag
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.release_ref || '', 'v'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ env.CHECKOUT_REF }}

      - name: Ensure release tag points to main
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          default_branch="${DEFAULT_BRANCH}"
          release_commit="$(git rev-parse HEAD^0)"

          git fetch origin "${default_branch}:refs/remotes/origin/${default_branch}" --force
          git merge-base --is-ancestor "${release_commit}" "refs/remotes/origin/${default_branch}"

  binaries:
    name: Build Binary ${{ matrix.goos }}/${{ matrix.goarch }}
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.release_ref || '', 'v'))
    runs-on: ubuntu-latest
    needs:
      - verify-release-tag
    strategy:
      fail-fast: true
      matrix:
        include:
          - goos: linux
            goarch: amd64
            goarm: ""
          - goos: linux
            goarch: arm64
            goarm: ""
          - goos: linux
            goarch: arm
            goarm: "7"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ env.CHECKOUT_REF }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Compute build metadata
        id: meta
        run: |
          {
            echo "version=${RELEASE_REF:-dev}"
            echo "commit=$(git rev-parse HEAD)"
            echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: |
          mkdir -p dist
          make build-cross \
            VERSION=${{ steps.meta.outputs.version }} \
            COMMIT=${{ steps.meta.outputs.commit }} \
            BUILD_DATE=${{ steps.meta.outputs.build_date }} \
            GOOS=${{ matrix.goos }} \
            GOARCH=${{ matrix.goarch }} \
            GOARM=${{ matrix.goarm }} \
            OUTPUT=dist/blackhole-threats-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Archive binary
        run: |
          cd dist
          tar -czf blackhole-threats-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz blackhole-threats-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  packages:
    name: Build Debian ${{ matrix.arch }}
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.release_ref || '', 'v'))
    runs-on: ubuntu-latest
    needs:
      - verify-release-tag
    strategy:
      fail-fast: true
      matrix:
        arch:
          - amd64
          - arm64
          - armhf

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ env.CHECKOUT_REF }}

      - name: Compute build metadata
        id: meta
        run: |
          {
            echo "version=${RELEASE_REF:-dev}"
            echo "commit=$(git rev-parse HEAD)"
            echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: Build Debian package in Debian trixie
        run: |
          docker run --rm \
            -e DEBIAN_FRONTEND=noninteractive \
            -e ARCH=${{ matrix.arch }} \
            -e VERSION=${{ steps.meta.outputs.version }} \
            -e COMMIT=${{ steps.meta.outputs.commit }} \
            -e BUILD_DATE=${{ steps.meta.outputs.build_date }} \
            -v "$PWD:/src" \
            -w /src \
            debian:trixie \
            bash -euo pipefail -lc '
              apt-get update
              apt-get install -y debhelper golang-any build-essential devscripts git \
                binutils-aarch64-linux-gnu binutils-arm-linux-gnueabihf
              build_root="$(mktemp -d)"
              trap '\''rm -rf "${build_root}"'\'' EXIT
              git config --global --add safe.directory /src
              git config --global --add safe.directory /src/.git
              git clone --quiet --no-local /src "${build_root}/source"
              git config --global --add safe.directory "${build_root}/source"
              cd "${build_root}/source"
              bash scripts/prepare-debian-changelog.sh "${VERSION}"
              mkdir -p /src/dist
              DEB_BUILD_OPTIONS=nocheck \
              DEB_HOST_ARCH="${ARCH}" \
              BLACKHOLE_LDFLAGS="-X github.com/soakes/blackhole-threats/internal/buildinfo.Version=${VERSION} -X github.com/soakes/blackhole-threats/internal/buildinfo.Commit=${COMMIT} -X github.com/soakes/blackhole-threats/internal/buildinfo.BuildDate=${BUILD_DATE}" \
                dpkg-buildpackage -d -us -uc -b -a"${ARCH}"
              find "${build_root}" -maxdepth 1 -type f \( -name "*.deb" -o -name "*.changes" -o -name "*.buildinfo" \) -exec mv {} /src/dist/ \;
            '

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: debian-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  source-packages:
    name: Build Debian Source Package
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.release_ref || '', 'v'))
    runs-on: ubuntu-latest
    needs:
      - verify-release-tag

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ env.CHECKOUT_REF }}

      - name: Build Debian source package in Debian trixie
        run: |
          docker run --rm \
            -e DEBIAN_FRONTEND=noninteractive \
            -e VERSION=${{ env.RELEASE_REF }} \
            -v "$PWD:/src" \
            -w /src \
            debian:trixie \
            bash -euo pipefail -lc '
              apt-get update
              apt-get install -y debhelper golang-any build-essential devscripts git
              build_root="$(mktemp -d)"
              trap '\''rm -rf "${build_root}"'\'' EXIT
              git config --global --add safe.directory /src
              git config --global --add safe.directory /src/.git
              git clone --quiet --no-local /src "${build_root}/source"
              git config --global --add safe.directory "${build_root}/source"
              cd "${build_root}/source"
              bash scripts/prepare-debian-changelog.sh "${VERSION}"
              package="$(dpkg-parsechangelog -SSource)"
              package_version="$(dpkg-parsechangelog -SVersion)"
              upstream_version="${package_version%-*}"
              if [ ! -f "../${package}_${upstream_version}.orig.tar.gz" ]; then
                git archive \
                  --format=tar.gz \
                  --prefix="${package}-${upstream_version}/" \
                  -o "../${package}_${upstream_version}.orig.tar.gz" \
                  HEAD
              fi
              dpkg-buildpackage -us -uc -S -sa
              mkdir -p /src/dist
              find "${build_root}" -maxdepth 1 -type f \
                \( \
                  -name "*.dsc" -o \
                  -name "*.orig.tar.*" -o \
                  -name "*.debian.tar.*" -o \
                  -name "*.diff.gz" -o \
                  -name "*.changes" -o \
                  -name "*.buildinfo" \
                \) \
                -exec mv {} /src/dist/ \;
            '

      - name: Upload source package artifact
        uses: actions/upload-artifact@v7
        with:
          name: debian-source
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.release_ref || '', 'v'))
    needs:
      - binaries
      - packages
      - source-packages
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ env.CHECKOUT_REF }}

      - name: Classify release tag
        id: release
        run: |
          ref_name="${RELEASE_REF}"

          if [[ "${ref_name}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            prerelease=true
            stable_tag="${ref_name%-rc.*}"
            previous_tag="$(
              git tag --list "${stable_tag}-rc.*" --sort=-v:refname \
                | grep -vx "${ref_name}" \
                | head -n1 || true
            )"
            if [ -z "${previous_tag}" ]; then
              previous_tag="$(
                git for-each-ref --sort=-v:refname --format='%(refname:short)' refs/tags/v* \
                  | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                  | head -n1 || true
              )"
            fi
          elif [[ "${ref_name}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            prerelease=false
            stable_tag="${ref_name}"
            previous_tag="$(
              git for-each-ref --sort=-v:refname --format='%(refname:short)' refs/tags/v* \
                | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                | grep -vx "${ref_name}" \
                | head -n1 || true
            )"
          else
            echo "Unsupported release tag format: ${ref_name}" >&2
            exit 1
          fi

          {
            echo "prerelease=${prerelease}"
            echo "stable_tag=${stable_tag}"
            echo "previous_tag=${previous_tag}"
            echo "release_sha=$(git rev-parse HEAD)"
          } >> "${GITHUB_OUTPUT}"

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Stage curated release assets
        run: |
          mkdir -p release/assets

          should_upload_asset() {
            local base="$1"

            case "${base}" in
              blackhole-threats-linux-amd64.tar.gz|blackhole-threats-linux-arm.tar.gz|blackhole-threats-linux-arm64.tar.gz)
                return 0
                ;;
              blackhole-threats_*_amd64.deb|blackhole-threats_*_arm64.deb|blackhole-threats_*_armhf.deb)
                [[ "${base}" != *-dbgsym_* ]]
                return
                ;;
              blackhole-threats_*.dsc|blackhole-threats_*.orig.tar.gz|blackhole-threats_*.debian.tar.xz)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          while IFS= read -r -d '' file; do
            test -s "$file"
            base="$(basename "$file")"
            if ! should_upload_asset "${base}"; then
              continue
            fi
            if [ -e "release/assets/${base}" ]; then
              echo "Duplicate release asset basename: ${base}" >&2
              exit 1
            fi
            cp "$file" "release/assets/${base}"
          done < <(find dist -type f -print0 | sort -z)

          if ! find release/assets -maxdepth 1 -type f | grep -q .; then
            echo "No curated release assets were staged" >&2
            exit 1
          fi

      - name: Write release notes
        run: |
          release_sha="${{ steps.release.outputs.release_sha }}"
          previous_tag="${{ steps.release.outputs.previous_tag }}"
          bash scripts/generate-release-notes.sh "${previous_tag}" "${release_sha}" release/release-notes.md

      - name: Generate checksums
        run: |
          cd release/assets
          find . -type f ! -name 'sha256sums.txt' -print0 | sort -z | xargs -0 sha256sum > sha256sums.txt

      - name: Publish release
        env:
          DEFAULT_GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          export GH_TOKEN="${DEFAULT_GH_TOKEN}"
          release_ref="${RELEASE_REF}"

          orphan_draft_ids="$(
            gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
              --jq ".[] | select(.draft == true and .tag_name == \"${release_ref}\" and (.html_url | contains(\"/releases/tag/untagged-\"))) | .id" || true
          )"
          if [ -n "${orphan_draft_ids}" ]; then
            while IFS= read -r release_id; do
              [ -n "${release_id}" ] || continue
              gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
            done <<< "${orphan_draft_ids}"
          fi

          mapfile -t assets < <(find release/assets -maxdepth 1 -type f | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets were staged for upload" >&2
            exit 1
          fi

          if gh release view "${release_ref}" >/dev/null 2>&1; then
            gh release upload "${release_ref}" --clobber "${assets[@]}"

            edit_args=(
              --draft=false
              --title "${release_ref}"
              --notes-file release/release-notes.md
            )
            if [ "${{ steps.release.outputs.prerelease }}" = "true" ]; then
              edit_args+=(--prerelease)
            else
              edit_args+=(--latest)
            fi

            gh release edit "${release_ref}" "${edit_args[@]}"
            exit 0
          fi

          create_args=(
            --title "${release_ref}"
            --notes-file release/release-notes.md
            --verify-tag
          )
          if [ "${{ steps.release.outputs.prerelease }}" = "true" ]; then
            create_args+=(--prerelease)
          else
            create_args+=(--latest)
          fi

          gh release create "${release_ref}" "${assets[@]}" "${create_args[@]}"
