name: Build and Validate

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Check formatting
        run: make fmt-check

      - name: Check shell scripts
        run: |
          bash -n scripts/build-apt-repository.sh
          bash -n scripts/generate-release-notes.sh
          bash -n scripts/next-release.sh
          bash -n scripts/prepare-debian-changelog.sh
          sh -n packaging/container/rootfs/usr/local/bin/blackhole-threats-entrypoint
          sh -n packaging/container/rootfs/etc/s6-overlay/s6-rc.d/blackhole-threats/run
          sh -n packaging/container/rootfs/etc/s6-overlay/s6-rc.d/blackhole-threats/log/run
          sh -n packaging/container/rootfs/etc/s6-overlay/s6-rc.d/blackhole-threats/finish

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Validate GitHub Pages website
        run: |
          npm ci --prefix website
          npm --prefix website run check
          make website-build \
            SITE_URL=https://soakes.github.io/blackhole-threats/ \
            SITE_RELEASE_VERSION=0.0.0-ci.${GITHUB_RUN_NUMBER} \
            SITE_COMMIT=${GITHUB_SHA} \
            SITE_BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            SITE_APT_FINGERPRINT="CI preview signing fingerprint"

      - name: Run vet
        run: make vet

      - name: Run tests
        run: make test

      - name: Build binary
        run: make build

      - name: Smoke test built binary
        run: |
          ./dist/blackhole-threats -version
          ./dist/blackhole-threats -conf examples/blackhole-threats.yaml -check-config
          cat > /tmp/blackhole-threats-smoke.yaml <<'EOF'
          gobgp:
            global:
              config:
                as: 64512
                routerid: "192.0.2.1"
                port: 1179
            neighbors:
              - config:
                  neighboraddress: "192.0.2.2"
                  peeras: 64512
          feeds: []
          EOF
          ./dist/blackhole-threats -conf /tmp/blackhole-threats-smoke.yaml -once
          ./dist/blackhole-threats -conf /tmp/blackhole-threats-smoke.yaml -once -log-format json > /tmp/blackhole-threats-json.log
          grep -F '"msg":"Starting blackhole-threats"' /tmp/blackhole-threats-json.log
          grep -F '"tag_version":' /tmp/blackhole-threats-json.log

  packaging:
    name: Validate Debian Package
    runs-on: ubuntu-latest
    needs:
      - quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Compute build metadata
        id: meta
        run: |
          echo "version=0.0.0~ci${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Validate Debian package in Debian trixie
        run: |
          docker run --rm \
            -e DEBIAN_FRONTEND=noninteractive \
            -e VERSION=${{ steps.meta.outputs.version }} \
            -e COMMIT=${{ github.sha }} \
            -e BUILD_DATE=${{ steps.meta.outputs.build_date }} \
            -v "$PWD:/src" \
            -w /src \
            debian:trixie \
            bash -euo pipefail -lc '
              apt-get update
              apt-get install -y debhelper golang-any build-essential devscripts lintian ca-certificates systemd
              build_root="$(mktemp -d)"
              trap '\''rm -rf "${build_root}"'\'' EXIT
              git config --global --add safe.directory /src
              git config --global --add safe.directory /src/.git
              git clone --quiet --no-local /src "${build_root}/source"
              git config --global --add safe.directory "${build_root}/source"
              cd "${build_root}/source"
              bash scripts/prepare-debian-changelog.sh "${VERSION}"
              make package VERSION="${VERSION}" COMMIT="${COMMIT}" BUILD_DATE="${BUILD_DATE}"
              deb="$(find "${build_root}" -maxdepth 1 -type f -name "blackhole-threats_*_*.deb" | head -n1)"
              test -n "${deb}"
              lintian "${deb}"
              apt-get install -y "${deb}"
              /usr/sbin/blackhole-threats -version
              /usr/sbin/blackhole-threats -check-config -conf /etc/blackhole-threats.yaml
              cat > /tmp/blackhole-threats-smoke.yaml <<'"'"'EOF'"'"'
              gobgp:
                global:
                  config:
                    as: 64512
                    routerid: "192.0.2.1"
                    port: 1179
                neighbors:
                  - config:
                      neighboraddress: "192.0.2.2"
                      peeras: 64512
              feeds: []
              EOF
              /usr/sbin/blackhole-threats -once -conf /tmp/blackhole-threats-smoke.yaml
              dpkg -L blackhole-threats
            '

  apt-repository:
    name: Validate Signed APT Repository Layout
    runs-on: ubuntu-latest
    needs:
      - quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Compute build metadata
        id: meta
        run: |
          echo "version=0.0.0~ci${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and smoke test signed APT repository in Debian trixie
        run: |
          docker run --rm \
            -e DEBIAN_FRONTEND=noninteractive \
            -e VERSION=${{ steps.meta.outputs.version }} \
            -e COMMIT=${{ github.sha }} \
            -e BUILD_DATE=${{ steps.meta.outputs.build_date }} \
            -v "$PWD:/src" \
            -w /src \
            debian:trixie \
            bash -euo pipefail -lc '
              apt-get update
              apt-get install -y apt-utils debhelper golang-any build-essential devscripts dpkg-dev git gnupg xz-utils \
                binutils-aarch64-linux-gnu binutils-arm-linux-gnueabihf
              build_root="$(mktemp -d)"
              trap '\''rm -rf "${build_root}"'\'' EXIT
              git config --global --add safe.directory /src
              git config --global --add safe.directory /src/.git
              git clone --quiet --no-local /src "${build_root}/source"
              git config --global --add safe.directory "${build_root}/source"
              cd "${build_root}/source"
              bash scripts/prepare-debian-changelog.sh "${VERSION}"
              mkdir -p site
              bash scripts/build-apt-repository.sh site "${VERSION}" "${COMMIT}" "${BUILD_DATE}"
              test -f site/dists/stable/Release
              test -f site/dists/stable/main/binary-amd64/Packages
              test -f site/dists/stable/main/source/Sources

              export GNUPGHOME="$(mktemp -d)"
              chmod 700 "${GNUPGHOME}"
              printf "%s\n" \
                "%no-protection" \
                "Key-Type: RSA" \
                "Key-Length: 2048" \
                "Name-Real: blackhole-threats CI APT Signing" \
                "Name-Email: ci@example.invalid" \
                "Expire-Date: 0" \
                "%commit" > /tmp/apt-signing-key.batch
              gpg --batch --generate-key /tmp/apt-signing-key.batch
              signing_key="$(gpg --batch --list-secret-keys --with-colons | grep "^fpr:" | head -n1 | cut -d: -f10)"
              test -n "${signing_key}"
              gpg --batch --yes --export "${signing_key}" > site/blackhole-threats-ci-archive-keyring.gpg
              release_file="site/dists/stable/Release"
              gpg --batch --yes \
                --local-user "${signing_key}" \
                --armor --detach-sign \
                --output "${release_file}.gpg" \
                "${release_file}"
              gpg --batch --yes \
                --local-user "${signing_key}" \
                --clearsign \
                --output "site/dists/stable/InRelease" \
                "${release_file}"

              repo_root="$(pwd)/site"
              apt_root="$(mktemp -d)"
              mkdir -p \
                "${apt_root}/etc/apt/keyrings" \
                "${apt_root}/etc/apt/sources.list.d" \
                "${apt_root}/var/lib/apt/lists/partial" \
                "${apt_root}/var/cache/apt/archives/partial" \
                "${apt_root}/var/lib/dpkg" \
                "${apt_root}/downloads" \
                "${apt_root}/src"
              cp site/blackhole-threats-ci-archive-keyring.gpg "${apt_root}/etc/apt/keyrings/"
              touch "${apt_root}/var/lib/dpkg/status"
              printf "%s\n" \
                "deb [signed-by=${apt_root}/etc/apt/keyrings/blackhole-threats-ci-archive-keyring.gpg] file:${repo_root} stable main" \
                "deb-src [signed-by=${apt_root}/etc/apt/keyrings/blackhole-threats-ci-archive-keyring.gpg] file:${repo_root} stable main" \
                > "${apt_root}/etc/apt/sources.list"

              apt_args=(
                -o "Dir=${apt_root}"
                -o "Dir::Etc::sourcelist=${apt_root}/etc/apt/sources.list"
                -o "Dir::Etc::sourceparts=${apt_root}/etc/apt/sources.list.d"
                -o "Dir::State::status=${apt_root}/var/lib/dpkg/status"
                -o "Dir::State::Lists=${apt_root}/var/lib/apt/lists"
                -o "Dir::Cache::Archives=${apt_root}/var/cache/apt/archives"
                -o "APT::Architecture=amd64"
                -o "APT::Get::List-Cleanup=0"
              )

              apt-get "${apt_args[@]}" update
              (
                cd "${apt_root}/downloads"
                apt-get "${apt_args[@]}" download blackhole-threats
              )
              (
                cd "${apt_root}/src"
                apt-get "${apt_args[@]}" source blackhole-threats
              )
            '

  cross-build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs:
      - quality
    strategy:
      fail-fast: true
      matrix:
        include:
          - goos: linux
            goarch: amd64
            goarm: ""
          - goos: linux
            goarch: arm64
            goarm: ""
          - goos: linux
            goarch: arm
            goarm: "7"

    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: 0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Build
        run: make build-cross GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} OUTPUT=dist/blackhole-threats-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: blackhole-threats-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/blackhole-threats-${{ matrix.goos }}-${{ matrix.goarch }}
