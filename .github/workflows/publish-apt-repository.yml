name: Publish Signed Debian Repository

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      release_ref:
        description: Stable release tag to publish with the current workflow definition, for example v1.2.3
        required: false
        type: string

concurrency:
  group: publish-apt-repository-${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.sha }}
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref_name }}

jobs:
  verify-release-tag:
    name: Verify Release Tag
    if: |
      (startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-rc.')) ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.release_ref || '', 'v') && !contains(inputs.release_ref || '', '-rc.'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ env.CHECKOUT_REF }}

      - name: Ensure release tag points to main
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          default_branch="${DEFAULT_BRANCH}"
          release_commit="$(git rev-parse HEAD^0)"

          git fetch origin "${default_branch}:refs/remotes/origin/${default_branch}" --force
          git merge-base --is-ancestor "${release_commit}" "refs/remotes/origin/${default_branch}"

  build:
    name: Build Signed Debian Repository
    if: |
      (startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-rc.')) ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.release_ref || '', 'v') && !contains(inputs.release_ref || '', '-rc.'))
    needs:
      - verify-release-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    environment:
      name: apt-repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ env.CHECKOUT_REF }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Compute build metadata
        id: meta
        run: |
          echo "version=${RELEASE_REF:-dev}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "site_url=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"

      - name: Build APT repository in Debian trixie
        run: |
          docker run --rm \
            -e DEBIAN_FRONTEND=noninteractive \
            -e HOST_UID=$(id -u) \
            -e HOST_GID=$(id -g) \
            -e VERSION=${{ steps.meta.outputs.version }} \
            -e COMMIT=${{ steps.meta.outputs.commit }} \
            -e BUILD_DATE=${{ steps.meta.outputs.build_date }} \
            -v "$PWD:/src" \
            -w /src \
            debian:trixie \
            bash -euo pipefail -lc '
              apt-get update
              apt-get install -y apt-utils debhelper golang-any build-essential devscripts dpkg-dev git xz-utils \
                binutils-aarch64-linux-gnu binutils-arm-linux-gnueabihf
              build_root="$(mktemp -d)"
              trap '\''rm -rf "${build_root}"'\'' EXIT
              git config --global --add safe.directory /src
              git config --global --add safe.directory /src/.git
              git clone --quiet --no-local /src "${build_root}/source"
              git config --global --add safe.directory "${build_root}/source"
              cd "${build_root}/source"
              bash scripts/prepare-debian-changelog.sh "${VERSION}"
              mkdir -p /src/site
              bash scripts/build-apt-repository.sh /src/site "${VERSION}" "${COMMIT}" "${BUILD_DATE}"
              chown -R "${HOST_UID}:${HOST_GID}" /src/site
            '

      - name: Import archive signing key
        id: signing
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_KEY_ID: ${{ secrets.APT_GPG_KEY_ID }}
        run: |
          test -n "${APT_GPG_PRIVATE_KEY}"
          export GNUPGHOME="${RUNNER_TEMP}/gnupg"
          mkdir -p "${GNUPGHOME}"
          chmod 700 "${GNUPGHOME}"
          printf '%s' "${APT_GPG_PRIVATE_KEY}" | gpg --batch --import
          key_id="${APT_GPG_KEY_ID}"
          if [ -z "${key_id}" ]; then
            key_id="$(gpg --batch --list-secret-keys --with-colons | awk -F: '$1 == "fpr" { print $10; exit }')"
          fi
          test -n "${key_id}"
          fingerprint="$(gpg --batch --with-colons --fingerprint "${key_id}" | awk -F: '$1 == "fpr" { print $10; exit }')"
          test -n "${fingerprint}"
          pretty_fingerprint="$(printf '%s' "${fingerprint}" | sed 's/.\{4\}/& /g; s/ $//')"
          echo "gnupg_home=${GNUPGHOME}" >> "$GITHUB_OUTPUT"
          echo "key_id=${key_id}" >> "$GITHUB_OUTPUT"
          echo "fingerprint=${fingerprint}" >> "$GITHUB_OUTPUT"
          echo "pretty_fingerprint=${pretty_fingerprint}" >> "$GITHUB_OUTPUT"

      - name: Export archive public key
        env:
          GNUPGHOME: ${{ steps.signing.outputs.gnupg_home }}
        run: |
          gpg --batch --yes --armor --export "${{ steps.signing.outputs.key_id }}" > site/blackhole-threats-archive-keyring.asc
          gpg --batch --yes --export "${{ steps.signing.outputs.key_id }}" > site/blackhole-threats-archive-keyring.gpg
          printf '%s\n' "${{ steps.signing.outputs.pretty_fingerprint }}" > site/blackhole-threats-archive-keyring.fingerprint.txt

      - name: Sign repository metadata
        env:
          GNUPGHOME: ${{ steps.signing.outputs.gnupg_home }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        run: |
          passphrase_args=()
          if [ -n "${APT_GPG_PASSPHRASE}" ]; then
            passphrase_args=(--pinentry-mode loopback --passphrase "${APT_GPG_PASSPHRASE}")
          fi
          release_file="site/dists/stable/Release"
          gpg --batch --yes "${passphrase_args[@]}" \
            --local-user "${{ steps.signing.outputs.key_id }}" \
            --armor --detach-sign \
            --output "${release_file}.gpg" \
            "${release_file}"
          gpg --batch --yes "${passphrase_args[@]}" \
            --local-user "${{ steps.signing.outputs.key_id }}" \
            --clearsign \
            --output "site/dists/stable/InRelease" \
            "${release_file}"

      - name: Smoke test signed repository with APT
        run: |
          repo_root="$(pwd)/site"
          apt_root="$(mktemp -d)"
          mkdir -p \
            "${apt_root}/etc/apt/keyrings" \
            "${apt_root}/etc/apt/sources.list.d" \
            "${apt_root}/var/lib/apt/lists/partial" \
            "${apt_root}/var/cache/apt/archives/partial" \
            "${apt_root}/var/lib/dpkg" \
            "${apt_root}/downloads" \
            "${apt_root}/src"
          cp site/blackhole-threats-archive-keyring.gpg "${apt_root}/etc/apt/keyrings/"
          touch "${apt_root}/var/lib/dpkg/status"
          cat > "${apt_root}/etc/apt/sources.list" <<EOF
          deb [signed-by=${apt_root}/etc/apt/keyrings/blackhole-threats-archive-keyring.gpg] file:${repo_root} stable main
          deb-src [signed-by=${apt_root}/etc/apt/keyrings/blackhole-threats-archive-keyring.gpg] file:${repo_root} stable main
          EOF

          apt_args=(
            -o "Dir=${apt_root}"
            -o "Dir::Etc::sourcelist=${apt_root}/etc/apt/sources.list"
            -o "Dir::Etc::sourceparts=${apt_root}/etc/apt/sources.list.d"
            -o "Dir::State::status=${apt_root}/var/lib/dpkg/status"
            -o "Dir::State::Lists=${apt_root}/var/lib/apt/lists"
            -o "Dir::Cache::Archives=${apt_root}/var/cache/apt/archives"
            -o "APT::Architecture=amd64"
            -o "APT::Get::List-Cleanup=0"
          )

          apt-get "${apt_args[@]}" update
          apt-cache "${apt_args[@]}" policy blackhole-threats
          (
            cd "${apt_root}/downloads"
            apt-get "${apt_args[@]}" download blackhole-threats
          )
          (
            cd "${apt_root}/src"
            apt-get "${apt_args[@]}" source blackhole-threats
          )

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Build GitHub Pages landing site
        run: |
          npm ci --prefix website
          make website-build \
            SITE_URL=${{ steps.meta.outputs.site_url }} \
            SITE_RELEASE_VERSION=${{ steps.meta.outputs.version }} \
            SITE_COMMIT=${{ steps.meta.outputs.commit }} \
            SITE_BUILD_DATE=${{ steps.meta.outputs.build_date }} \
            SITE_APT_FINGERPRINT="${{ steps.signing.outputs.pretty_fingerprint }}"
          cp -a website/dist/. site/

      - name: Publish durable repository snapshot branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          snapshot_root="$(mktemp -d)"
          trap 'rm -rf "${snapshot_root}"' EXIT
          git init -q "${snapshot_root}"
          cd "${snapshot_root}"
          git checkout --orphan pages-snapshot
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp -a "${GITHUB_WORKSPACE}/site/." .
          git add --all
          git commit -m "pages: snapshot ${RELEASE_REF}"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin HEAD:pages-snapshot

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy Debian Repository
    if: |
      (startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-rc.')) ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.release_ref || '', 'v') && !contains(inputs.release_ref || '', '-rc.'))
    needs:
      - build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
