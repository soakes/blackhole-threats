name: Automated Release Candidate

on:
  workflow_run:
    workflows:
      - Build and Validate
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: automated-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

jobs:
  tag:
    name: Create Release Candidate Tag
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest

    env:
      RELEASE_SHA: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ env.RELEASE_SHA }}

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Skip if release tag already exists on HEAD
        id: existing
        run: |
          existing_tag="$(git tag --points-at "${RELEASE_SHA}" --list 'v*' | head -n1 || true)"
          if [ -n "${existing_tag}" ]; then
            echo "release_required=false" >> "${GITHUB_OUTPUT}"
            echo "existing_tag=${existing_tag}" >> "${GITHUB_OUTPUT}"
          else
            echo "release_required=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Compute next release tag
        id: release
        if: steps.existing.outputs.release_required == 'true'
        run: |
          while IFS='=' read -r key value; do
            echo "${key}=${value}" >> "${GITHUB_OUTPUT}"
          done < <(bash scripts/next-release.sh)

      - name: Compute next prerelease tag
        id: candidate
        if: steps.existing.outputs.release_required == 'true' && steps.release.outputs.release_required == 'true'
        run: |
          stable_tag="${{ steps.release.outputs.next_tag }}"
          latest_candidate="$(
            git tag --list "${stable_tag}-rc.*" --sort=-v:refname \
              | head -n1 || true
          )"
          rc_number=1
          if [ -n "${latest_candidate}" ]; then
            rc_number="${latest_candidate##*.}"
            rc_number="$((rc_number + 1))"
          fi
          echo "stable_tag=${stable_tag}" >> "${GITHUB_OUTPUT}"
          echo "candidate_tag=${stable_tag}-rc.${rc_number}" >> "${GITHUB_OUTPUT}"

      - name: Create and push prerelease tag
        if: steps.existing.outputs.release_required == 'true' && steps.release.outputs.release_required == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.candidate.outputs.candidate_tag }}" -m "Release candidate ${{ steps.candidate.outputs.candidate_tag }}"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "refs/tags/${{ steps.candidate.outputs.candidate_tag }}"

      - name: Dispatch prerelease publish workflows
        if: steps.existing.outputs.release_required == 'true' && steps.release.outputs.release_required == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dispatch_ref="${{ github.event.repository.default_branch }}"
          gh workflow run container-image.yml --ref "${dispatch_ref}" -f release_ref="${{ steps.candidate.outputs.candidate_tag }}"
          gh workflow run release-assets.yml --ref "${dispatch_ref}" -f release_ref="${{ steps.candidate.outputs.candidate_tag }}"

      - name: Wait for prerelease publish workflows
        if: steps.existing.outputs.release_required == 'true' && steps.release.outputs.release_required == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          resolve_run_id() {
            local workflow="$1"
            local run_id=''

            for _ in $(seq 1 24); do
              run_id="$(
                gh run list --workflow "${workflow}" --limit 30 --json databaseId,event,headSha \
                  --jq '.[] | select(.event == "workflow_dispatch" and .headSha == "'"${RELEASE_SHA}"'") | .databaseId' \
                  | head -n1 || true
              )"
              if [ -n "${run_id}" ]; then
                printf '%s\n' "${run_id}"
                return 0
              fi
              sleep 5
            done

            echo "Timed out waiting for ${workflow} run registration" >&2
            return 1
          }

          release_run_id="$(resolve_run_id release-assets.yml)"
          container_run_id="$(resolve_run_id container-image.yml)"

          gh run watch "${release_run_id}" --exit-status
          gh run watch "${container_run_id}" --exit-status

      - name: Create and push stable tag
        if: steps.existing.outputs.release_required == 'true' && steps.release.outputs.release_required == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.candidate.outputs.stable_tag }}" -m "Release ${{ steps.candidate.outputs.stable_tag }}"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "refs/tags/${{ steps.candidate.outputs.stable_tag }}"

      - name: Dispatch stable publish workflows
        if: steps.existing.outputs.release_required == 'true' && steps.release.outputs.release_required == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dispatch_ref="${{ github.event.repository.default_branch }}"
          gh workflow run container-image.yml --ref "${dispatch_ref}" -f release_ref="${{ steps.candidate.outputs.stable_tag }}"
          gh workflow run release-assets.yml --ref "${dispatch_ref}" -f release_ref="${{ steps.candidate.outputs.stable_tag }}"
          gh workflow run publish-apt-repository.yml --ref "${dispatch_ref}" -f release_ref="${{ steps.candidate.outputs.stable_tag }}"

      - name: Write workflow summary
        run: |
          if [ "${{ steps.existing.outputs.release_required }}" = "false" ]; then
            printf 'Release tag already present on HEAD: `%s`\n' "${{ steps.existing.outputs.existing_tag }}" >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          if [ "${{ steps.release.outputs.release_required }}" != "true" ]; then
            printf 'No releasable commits were found since `%s`; skipping automated RC tagging.\n' "${{ steps.release.outputs.previous_tag }}" >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          printf 'Created automated release candidate `%s`, validated the prerelease publish path, and promoted it to stable `%s` (%s bump from `%s`).\n' \
            "${{ steps.candidate.outputs.candidate_tag }}" \
            "${{ steps.candidate.outputs.stable_tag }}" \
            "${{ steps.release.outputs.bump }}" \
            "${{ steps.release.outputs.previous_tag }}" >> "${GITHUB_STEP_SUMMARY}"
