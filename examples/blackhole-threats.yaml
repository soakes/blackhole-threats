# Reference configuration using RFC 5737 / RFC 3849 documentation addresses.
# Replace the local ASN, router ID, neighbors, and feed set to match your
# network before deployment.
gobgp:
  global:
    config:
      as: 64520
      routerid: "198.51.100.10"
  neighbors:
    - config:
        neighboraddress: "198.51.100.1"
        peeras: 64520
        # Optional: connect to this peer on a non-default TCP port.
        # Omit this line to use standard BGP port 179.
        # port: 1179
    - config:
        neighboraddress: "198.51.100.2"
        peeras: 64520
    - config:
        neighboraddress: "203.0.113.1"
        peeras: 64520
    - config:
        neighboraddress: "203.0.113.2"
        peeras: 64520
    - config:
        neighboraddress: "192.0.2.1"
        peeras: 64520
    - config:
        neighboraddress: "2001:db8:10::1"
        peeras: 64520
    - config:
        neighboraddress: "2001:db8:10::2"
        peeras: 64520
    - config:
        neighboraddress: "2001:db8:20::1"
        peeras: 64520
    - config:
        neighboraddress: "2001:db8:20::2"
        peeras: 64520
    - config:
        neighboraddress: "2001:db8:30::1"
        peeras: 64520

